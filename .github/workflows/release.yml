name: Build Android Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build signed AAB + APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Decode keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          echo "Wrote keystore: $(wc -c < android/app/keystore.jks) bytes"

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
          echo "Wrote android/key.properties"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos || true

      - name: Build AAB (release)
        run: flutter build appbundle --release

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Delete old artifacts
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            );
            for (const run of runs) {
              if (run.id === context.runId) continue;
              const arts = await github.paginate(
                github.rest.actions.listWorkflowRunArtifacts,
                { owner, repo, run_id: run.id, per_page: 100 }
              );
              for (const a of arts) {
                core.info(`Deleting artifact ${a.name} (id=${a.id}) from run ${run.id}`);
                await github.rest.actions.deleteArtifact({
                  owner, repo, artifact_id: a.id,
                });
              }
            }

      - name: Publish GitHub Release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup secrets
        if: always()
        run: rm -f android/app/keystore.jks android/key.properties
